<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reading List</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="app-wrapper">

  <!-- ── HEADER ──────────────────────────────────────────────────── -->
  <header>
    <div class="header-top">
      <div class="header-left">
        <div class="header-eyebrow">Research Papers</div>
        <h1>Reading <em>List</em></h1>
      </div>

      <div class="header-right">
        <div class="header-stats">
          <div class="stat">
            <div class="stat-num" id="stat-total">0</div>
            <div class="stat-label">Total</div>
          </div>
          <div class="stat">
            <div class="stat-num" id="stat-done">0</div>
            <div class="stat-label">Done</div>
          </div>
          <div class="stat">
            <div class="stat-num" id="stat-high">0</div>
            <div class="stat-label">High Pri</div>
          </div>
        </div>

        <!-- ── Day / Night Toggle ─────────────────────────── -->
        <button class="theme-toggle" onclick="toggleTheme()" title="Switch day / night mode">
          <span class="theme-icon">☀️</span>
          <div class="theme-toggle-track">
            <div class="theme-toggle-thumb"></div>
          </div>
          <span class="theme-label" id="theme-label">Day</span>
        </button>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-row">
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <span class="progress-label" id="progress-label">0% complete</span>
    </div>
  </header>

  <!-- ── TOOLBAR ─────────────────────────────────────────────────── -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="search" id="search" placeholder="Search title, author, category, notes…"/>
    </div>

    <select id="filter-category">
      <option value="all">All categories</option>
    </select>

    <select id="filter-completed">
      <option value="all">All status</option>
      <option value="todo">To read</option>
      <option value="done">Completed</option>
    </select>
  </div>

  <!-- ── FILTER CHIPS + VISIBILITY ───────────────────────────────── -->
  <div class="filter-row">
    <span class="filter-label">Priority</span>
    <button class="chip active" data-priority="all"    onclick="setPriority('all')">All</button>
    <button class="chip"        data-priority="red"    onclick="setPriority('red')">
      <span class="chip-dot chip-dot-red"></span> High
    </button>
    <button class="chip"        data-priority="yellow" onclick="setPriority('yellow')">
      <span class="chip-dot chip-dot-yellow"></span> Medium
    </button>
    <button class="chip"        data-priority="green"  onclick="setPriority('green')">
      <span class="chip-dot chip-dot-green"></span> Low
    </button>

    <span style="flex:1"></span>

    <!-- Visibility toggle — shows/hides hidden entries -->
    <button class="btn-visibility" id="btn-visibility" onclick="toggleShowHidden()">
      <!-- filled in by JS -->
    </button>
  </div>

  <!-- ── TABLE ───────────────────────────────────────────────────── -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:34px"></th>
          <th style="width:44px" data-sort="priority" onclick="setSort('priority')">
            Pri <span class="sort-icon">↕</span>
          </th>
          <th data-sort="title" onclick="setSort('title')">
            Title / Authors <span class="sort-icon">↕</span>
          </th>
          <th class="hide-mobile" data-sort="year" onclick="setSort('year')" style="width:68px">
            Year <span class="sort-icon">↕</span>
          </th>
          <th class="hide-mobile" style="width:200px">Categories</th>
          <th style="width:120px">Links</th>
          <th class="hide-mobile" style="width:160px">Notes</th>
          <th style="width:72px"></th>
        </tr>
      </thead>
      <tbody id="table-body">
        <!-- rows rendered by JS -->
      </tbody>
    </table>
  </div>

</div><!-- /app-wrapper -->

<script src="js/app.js"></script>
</body>
</html>
